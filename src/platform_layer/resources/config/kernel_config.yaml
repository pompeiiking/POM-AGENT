kernel:
  # 关卡② 上下文隔离：对送入 LLM 的 system / memory / history / 当前 user|tool 文本加 pompeii 分区注释（默认 true）
  # context_isolation_enabled: true
  # 归档后异步 LLM 摘要（写入 session_archives.llm_*；默认关闭；密钥走所选 provider 的 api_key_env）
  # archive_llm_summary_enabled: false
  # archive_llm_summary_provider_id: ""  # 空则使用 model_providers 的 default_provider
  # archive_llm_summary_max_dialogue_chars: 12000
  # archive_llm_summary_max_output_chars: 2000
  # archive_llm_summary_system_prompt: ""
  # 可插拔策略（默认 builtin:default）：tool → pompeii_agent.tool_policies；loop → pompeii_agent.loop_policies
  # tool_policy_engine_ref: "builtin:default"
  # loop_policy_engine_ref: "builtin:default"
  # 系统提示词后处理（默认 builtin:none）：在 YAML 模板 + 活跃技能块合并之后执行；亦可 providers / prompts 合并 params.prompt_strategy_ref 按 provider 覆盖
  # prompt_strategy_ref: "builtin:none"
  core_max_loops: 8
  max_tool_calls_per_run: 8
  tool_allowlist:
    - echo
    - take_photo
    - ping
    - add
    - search_memory
  tool_confirmation_required:
    - echo
    - take_photo
  # 多 Agent：非空时仅允许 /delegate 到列表内 target（与 Port 解析 token 规则一致）；省略或 [] 表示不限制
  # delegate_target_allowlist:
  #   - worker
  #   - sub_agent

