# MCP stdio 客户端（可选）。默认关闭；开启前请阅读官方 Registry 与安全清单：
# - https://modelcontextprotocol.io/registry
# - https://github.com/fuzzylabs/awesome-secure-mcp-servers
#
# 仅允许本文件声明的 command/args；勿将用户输入拼入进程参数。
# {src_root} 在加载时替换为仓库 src 绝对路径（供 PYTHONPATH）。
# 设为 false 可关闭子进程 MCP（生产环境若不需要 ping/add 演示可关闭）。
#
# bridge_ref（可选，默认 builtin:stdio）：
#   - builtin:stdio — 内置 stdio 多进程客户端
#   - builtin:http_json — 内置 HTTP 网关桥（POST {base_url}/tools/call）
#   - entrypoint:<name> — setuptools 组 pompeii_agent.mcp_bridges，工厂 (cfg, src_root) -> McpToolBridge | None
enabled: true
bridge_ref: "builtin:stdio"
servers:
  - id: pompeii-demo
    command: python
    args: ["-m", "infra.mcp_demo_server"]
    env:
      PYTHONPATH: "{src_root}"
    timeout_seconds: 45

