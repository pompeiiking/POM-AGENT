# 长期记忆双库策略（标准 SQLite + 向量投影 + FTS + 可选 rerank）
# 可变项集中于此，避免核心硬编码（airules: zero-hardcoding）

memory_policy:
  # 与会话 SessionStore 对称：builtin / entrypoint:<name>（组名见 app/memory_orchestrator_registry.py）
  dual_store_ref: "builtin:dual_sqlite"
  embedding_ref: "builtin:hash"
  # 可选：OpenAI 兼容嵌入（需设置对应环境变量中的 API key；与 embedding_dim 对齐模型输出维度）
  # embedding_ref: "builtin:openai_compatible"
  # embedding_openai:
  #   api_key_env: "OPENAI_API_KEY"
  #   base_url: "https://api.openai.com"
  #   model: "text-embedding-3-small"
  #   timeout_seconds: 30
  enabled: true
  retrieve_top_k: 6
  rrf_k: 60
  rerank_enabled: true
  rerank_max_candidates: 24
  chunk_max_chars: 512
  chunk_overlap_chars: 64
  promote_on_archive: true
  archive_chunk_max_chars: 8000
  archive_trust: medium
  embedding_async: true
  embedding_dim: 64
  fts_enabled: true
  vector_max_candidates: 200
  channel_filter: match_or_global
  # 可选：独立向量/检索服务（HTTP）。返回 JSON list[{memory_id,text,score}]
  # remote_retrieval_url: "http://127.0.0.1:9000/retrieve"
  # remote_timeout_seconds: 5
