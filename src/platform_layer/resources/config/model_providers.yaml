# 统一模型提供方配置（加载：app/config_loaders/model_provider_loader.load_model_registry）
#
# default_provider: 当 session_defaults.yaml 中 session.model 无法匹配任一 id 时回退到该 provider。
# providers.<id>: 每个 id 可被 session.model 引用，用于按会话切换模型后端。
#
# backend 取值：
#   - stub：不发起 HTTP，返回占位文本（便于无 Key 开发）。
#   - openai_compatible：OpenAI 兼容 /v1/chat/completions（DeepSeek、OpenAI、多数聚合网关等）。
#
# 密钥：禁止写入本文件；在 params.api_key_env 中声明环境变量名，运行前在 shell 中 export。
#
# 可选：
#   params.model_backend_ref: 聊天推理后端热插拔（默认 builtin:openai_chat；亦可 entrypoint:<name> 注册到 pompeii_agent.model_backends）
#
# 可选 Failover（架构 3.2）：主 provider 为 openai_compatible 且返回可识别的失败文案时，按序换用链上其它 id（仅一层，不递归备用的 failover_chain）。
#   failover_chain: ["openai", "stub"]
#
# 可选（OpenAI 兼容原生工具）：
#   params.tools: [ { "type": "function", "function": { "name": "...", "description": "...", "parameters": {...} } }, ... ]
#   params.tool_choice: "auto" | "none" | { "type": "function", "function": { "name": "..." } }
# 提示词相关配置已迁移到 prompts.yaml（按 provider.id 合并注入）
# 亦可在此或 prompts 合并 params 中设置 prompt_strategy_ref（覆盖 kernel.prompt_strategy_ref）：builtin:none 或 entrypoint:<name> → pompeii_agent.prompt_strategies
# 响应中的 message.tool_calls 会被解析为 ModelOutput(kind=tool_call)。
#
# 连接复用（默认开启）：同 base_url + timeout 复用 httpx 连接池；单测或排障可设 params.http_disable_connection_pool: true
#
# 简易熔断（可选，按 provider.id 状态）：连续「与 Failover 相同的文本失败启发式」达阈值后，在 open_seconds 内拒绝新请求（返回熔断文案）。
#   params.model_circuit_failure_threshold: 正整数启用；缺省或 0 关闭
#   params.model_circuit_open_seconds: 熔断时长（秒），默认 60，最小 1
#
# 滑动窗口调用限流（可选，进程内计量）：在 OpenAI 兼容路径上，每 provider 在 window 内最多 max 次「即将发起 HTTP 的请求」；超限返回文案含「调用过于频繁」，可被 failover_chain 换备用。
#   params.model_rate_max_calls_per_window: 正整数启用；缺省或 0 关闭
#   params.model_rate_window_seconds: 窗口秒数，默认 60，最小 1
#
# 流式（OpenAI 兼容 SSE）：
#   params.stream: true
#   且 HTTP/Port 入站 UserMessageInput.stream / AgentRequest.stream 为真。
#   未配置 params.tools 时走 SSE；若配置了 tools 且需流式，须同时 **params.stream_with_tools: true**（依赖上游对流式 tool_calls 的支持）。
#   events 中会额外出现 kind=stream_delta（正文 delta）；tool 结果在流结束后解析为 tool_call。

default_provider: deepseek

providers:
  stub:
    backend: stub
    params: {}

  deepseek:
    backend: openai_compatible
    params:
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      api_key_env: "DEEPSEEK_API_KEY"
      max_history: 10
      timeout: 30.0

  openai:
    backend: openai_compatible
    params:
      base_url: "https://api.openai.com"
      model: "gpt-4o-mini"
      api_key_env: "OPENAI_API_KEY"
      max_history: 10
      timeout: 60.0
