# 关卡⑤ 数据访问控制（资源级读/写）；由 resource_index.active_resource_access_profile 选择 profile
resource_access:
  profiles:
    default:
      resources:
        long_term_memory:
          read: allow
          write: allow
          # read_requires_approval: false
          # write_requires_approval: true
        # 是否允许将 user 多模态 image_url 传入 OpenAI 兼容请求（组装部预处理可据 tools.network_policy 再校验 URL）
        multimodal_image_url:
          read: allow
          write: deny
        # 远端检索服务（memory_policy.remote_retrieval_url）调用权限
        remote_retrieval:
          read: allow
          write: deny
        # 会话数据访问
        session_data:
          read: allow
          write: allow
        # 工具执行权限
        tool_execution:
          read: allow
          write: allow
        # 设备访问权限
        device_access:
          read: allow
          write: allow
        # 外部 API 调用
        external_api:
          read: allow
          write: deny
        # 文件系统访问
        filesystem:
          read: allow
          write: deny

    # 示例：禁止模型/用户经工具与指令写入长期记忆，仍可读检索与上下文注入
    memory_readonly:
      resources:
        long_term_memory:
          read: allow
          write: deny
        multimodal_image_url:
          read: allow
          write: deny
        remote_retrieval:
          read: allow
          write: deny
        session_data:
          read: allow
          write: allow
        tool_execution:
          read: allow
          write: allow
        device_access:
          read: allow
          write: deny
        external_api:
          read: allow
          write: deny
        filesystem:
          read: allow
          write: deny

    # 严格模式：最小权限原则
    strict:
      resources:
        long_term_memory:
          read: allow
          write: deny
          write_requires_approval: true
        multimodal_image_url:
          read: deny
          write: deny
        remote_retrieval:
          read: allow
          write: deny
        session_data:
          read: allow
          write: allow
        tool_execution:
          read: allow
          write: allow
          write_requires_approval: true
        device_access:
          read: deny
          write: deny
        external_api:
          read: deny
          write: deny
        filesystem:
          read: deny
          write: deny
