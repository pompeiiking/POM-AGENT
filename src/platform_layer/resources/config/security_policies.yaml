security_policies:
  items:
    - id: "baseline"
      input_max_chars: 12000
      max_requests_per_minute: 60
      guard_enabled: false
      guard_block_patterns:
        - "ignore previous instructions"
        - "system prompt"
        - "developer message"
      guard_tool_output_redaction: "[guard_blocked_tool_output]"
      guard_evaluator_ref: "builtin:default"
      guard_model_ref: "builtin:none"
      default_tool_risk_level: "low"
      tool_confirmation_level: "high"
      tool_risk_overrides:
        take_photo: "high"
      # 关卡④：写入会话前工具输出截断（可选；0=不截断；默认省略即为 0）
      # tool_output_max_chars: 8192
      # tool_output_truncation_marker: "…[truncated]"
      # tool_output_max_chars_overrides:   # 按工具名覆盖上限；值为 0 表示该工具不截断
      #   some_tool: 4096
      # 信任分级（仅当 tool_output_max_chars_by_trust 非空时生效；MCP 结果在桥接层标记 source=mcp）
      # default_tool_output_trust: "high"
      # tool_output_trust_overrides: { noisy: "low" }
      # mcp_tool_output_trust: "low"
      # device_tool_output_trust: "low"   # Port /device_result 回传
      # tool_output_max_chars_by_trust: { low: 4096, medium: 16384, high: 0 }
      # http_fetch_tool_output_trust: "low"   # ToolResult.source=http_fetch（如 http_get）时的信任档
      # 关卡④-c：工具结果专用注入子串（在截断后、guard_block_patterns 之前；与入口 guard 独立）
      # 默认拦截伪造关卡② HTML 分区边界，防止工具回注冒充记忆区/工具区结构
      tool_output_injection_patterns:
        - "<!-- pompeii:zone-end"
        - "<!-- pompeii:zone-begin"
      tool_output_injection_redaction: "[tool_output_injection_blocked]"
