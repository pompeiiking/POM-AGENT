session:
  # 对应 model_providers.yaml 中 providers 的 id，用于选择该会话使用的模型后端
  model: "deepseek"
  # 提示词档位：从 prompts.yaml -> prompts.providers.<id>.prompt_profiles 中选取
  prompt_profile: "default"
  # 提示词策略：从 prompt_profiles.<profile>.<strategy> 中选取，默认 default
  prompt_strategy: "default"
  skills:
    - "echo"
  security: "baseline"
  limits:
    max_tokens: 100000
    max_context_window: 128000
    max_loops: 15
    timeout_seconds: 300.0
    # 组装部纳入 Context 的最近消息条数（1–200，过大时仍由模型 max_history 等约束）
    assembly_tail_messages: 20
    # 组装部单条消息最大字符数（渲染为纯文本后截断，0=不限制）；与 assembly_tail_messages 一起做粗粒度上下文压缩
    assembly_message_max_chars: 12000
    # 组装部纳入 Context 的近似 token 总量上限（0=不按总量裁剪）；与单条字符上限配合完成 P1
    # assembly_token_counter: heuristic   # 或 tiktoken（需 pip install tiktoken，按 assembly_tiktoken_encoding 分词）
    # assembly_tiktoken_encoding: cl100k_base
    assembly_approx_context_tokens: 24000
    # §7.3 可选：超限时先截 tool 正文 / 再折叠早期纯文本 user+assistant（0=关闭该级）
    # assembly_compress_tool_max_chars: 800
    # assembly_compress_early_turn_chars: 256
    summary_tail_messages: 12
    summary_excerpt_chars: 200
