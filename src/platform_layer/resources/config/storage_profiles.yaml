# archive：会话存储（SessionStore），热插拔见 archive.store_ref（默认 builtin:sqlite）
# memory.path：MemoryOrchestrator 双库（DualMemoryStore）文件路径（见 memory_policy.enabled）
# memory.store_ref：仅对应旧版 LongTermMemoryStore 注册表；主路径开启记忆时必须 builtin:noop（resource_validation 强制）
storage_profiles:
  items:
    - id: "default"
      archive:
        backend: "sqlite"
        store_ref: "builtin:sqlite"
        path: "platform_layer/resources/data/sessions.db"
      memory:
        backend: "sqlite"
        store_ref: "builtin:noop"
        path: "platform_layer/resources/data/memory.db"
